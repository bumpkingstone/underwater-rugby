<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Rugby</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 60px;
            color: #0ff;
            font-size: 32px;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
            pointer-events: none;
        }
        #energy-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #0ff;
            border-radius: 10px;
            overflow: hidden;
        }
        #energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ff, #0f0);
            width: 100%;
            transition: width 0.1s;
        }
        #controls-hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #0ff;
            font-size: 14px;
            text-shadow: 0 0 5px #0ff;
            text-align: center;
        }
        #player-indicator {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff0;
            font-size: 18px;
            text-shadow: 0 0 10px #ff0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-a">CYAN: 0</div>
            <div id="score-b">MAGENTA: 0</div>
        </div>
        <div id="player-indicator">Controlling: Player 1</div>
        <div id="energy-bar"><div id="energy-fill"></div></div>
        <div id="controls-hint">WASD: Move | U: Up | I: Down | TAB: Switch Player | SPACE: Sprint</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
// Game constants
const FIELD_RADIUS = 15;
const GOAL_WIDTH = 6;
const GOAL_DEPTH = 3;
const BALL_RADIUS = 0.5;
const PLAYER_RADIUS = 0.8;
const TEAM_A_COLOR = 0x00ffff;
const TEAM_B_COLOR = 0xff00ff;

// Game state
let scoreA = 0;
let scoreB = 0;
let gameRunning = true;
let controlledPlayerIndex = 0;

// Energy system
let energy = 100;
const MAX_ENERGY = 100;
const ENERGY_DRAIN = 30; // per second while sprinting
const ENERGY_REGEN = 15; // per second while not sprinting

// Movement constants
const PLAYER_SPEED = 5;
const SPRINT_MULTIPLIER = 2;
const VERTICAL_SPEED = 3;
const UNDERWATER_DRAG = 0.95;

// Audio system
let audioContext;
let bgMusicGain, sfxGain;
let playerVelocity = new THREE.Vector3(); // Track controlled player's movement direction

function initAudio() {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    bgMusicGain = audioContext.createGain();
    bgMusicGain.gain.value = 0.3;
    bgMusicGain.connect(audioContext.destination);

    sfxGain = audioContext.createGain();
    sfxGain.gain.value = 0.5;
    sfxGain.connect(audioContext.destination);
}

function playBackgroundMusic() {
    if (!audioContext) initAudio();

    // Simple ambient drone
    const osc1 = audioContext.createOscillator();
    const osc2 = audioContext.createOscillator();
    const filter = audioContext.createBiquadFilter();

    osc1.type = 'sine';
    osc1.frequency.value = 55;
    osc2.type = 'sawtooth';
    osc2.frequency.value = 57;

    filter.type = 'lowpass';
    filter.frequency.value = 200;

    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(bgMusicGain);

    osc1.start();
    osc2.start();
}

function playGoalSound(team) {
    if (!audioContext) initAudio();

    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.type = 'square';
    osc.frequency.setValueAtTime(440, audioContext.currentTime);
    osc.frequency.setValueAtTime(880, audioContext.currentTime + 0.1);
    osc.frequency.setValueAtTime(660, audioContext.currentTime + 0.2);

    gain.gain.setValueAtTime(0.5, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

    osc.connect(gain);
    gain.connect(sfxGain);

    osc.start();
    osc.stop(audioContext.currentTime + 0.5);
}

function playCollisionSound() {
    if (!audioContext) initAudio();

    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.type = 'sine';
    osc.frequency.value = 150 + Math.random() * 100;

    gain.gain.setValueAtTime(0.2, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

    osc.connect(gain);
    gain.connect(sfxGain);

    osc.start();
    osc.stop(audioContext.currentTime + 0.1);
}

function playSprintSound() {
    if (!audioContext) initAudio();

    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, audioContext.currentTime);
    osc.frequency.linearRampToValueAtTime(400, audioContext.currentTime + 0.15);

    gain.gain.setValueAtTime(0.15, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);

    osc.connect(gain);
    gain.connect(sfxGain);

    osc.start();
    osc.stop(audioContext.currentTime + 0.2);
}

// Three.js components
let scene, camera, renderer;
let ball, players = [];
let playerBodies = []; // Physics representations

// Input state
const keys = {};

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Tab') e.preventDefault();
        });
        document.addEventListener('keyup', e => keys[e.code] = false);

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a12);
            scene.fog = new THREE.Fog(0x0a0a12, 20, 50);

            // Camera (isometric view)
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(20, 25, 20);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0x00ffff, 1, 50);
            pointLight1.position.set(-10, 10, -10);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0xff00ff, 1, 50);
            pointLight2.position.set(10, 10, 10);
            scene.add(pointLight2);

            // Create field (hexagonal)
            createField();

            // Create ball
            createBall();

            // Create players (3 per team)
            createPlayers();

            // Create particles (bubbles)
            createBubbles();

            // Handle resize
            window.addEventListener('resize', onWindowResize);

            // Start game loop
            gameLoop();

            // Start audio on first interaction
            document.addEventListener('click', () => {
                if (!audioContext) playBackgroundMusic();
            }, { once: true });
            document.addEventListener('keydown', () => {
                if (!audioContext) playBackgroundMusic();
            }, { once: true });
        }

        function createField() {
            // Hexagonal field boundary (glowing lines)
            const hexShape = new THREE.Shape();
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
                const x = Math.cos(angle) * FIELD_RADIUS;
                const z = Math.sin(angle) * FIELD_RADIUS;
                if (i === 0) hexShape.moveTo(x, z);
                else hexShape.lineTo(x, z);
            }
            hexShape.closePath();

            const points = hexShape.getPoints();
            const geometry = new THREE.BufferGeometry().setFromPoints(
                points.map(p => new THREE.Vector3(p.x, 0, p.y))
            );
            const material = new THREE.LineBasicMaterial({
                color: 0x00ffff,
                linewidth: 2
            });
            const hexLine = new THREE.LineLoop(geometry, material);
            hexLine.position.y = 0.1;
            scene.add(hexLine);

            // Goal areas (cyan team left, magenta team right)
            const goalGeometry = new THREE.BoxGeometry(GOAL_WIDTH, 3, GOAL_DEPTH);
            const cyanMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                transparent: true,
                opacity: 0.3
            });
            const magentaMaterial = new THREE.MeshBasicMaterial({
                color: 0xff00ff,
                transparent: true,
                opacity: 0.3
            });

            // Left goal (cyan)
            const leftGoal = new THREE.Mesh(goalGeometry, cyanMaterial);
            leftGoal.position.set(-FIELD_RADIUS - GOAL_DEPTH/2, 1.5, 0);
            scene.add(leftGoal);

            // Right goal (magenta)
            const rightGoal = new THREE.Mesh(goalGeometry, magentaMaterial);
            rightGoal.position.set(FIELD_RADIUS + GOAL_DEPTH/2, 1.5, 0);
            scene.add(rightGoal);
        }

        function createBall() {
            const geometry = new THREE.SphereGeometry(BALL_RADIUS, 16, 16);
            const material = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                emissive: 0xffffff,
                emissiveIntensity: 0.5
            });
            ball = new THREE.Mesh(geometry, material);
            ball.position.set(0, 1, 0);
            ball.userData.velocity = new THREE.Vector3();
            scene.add(ball);

            // Glow effect
            const glowGeometry = new THREE.SphereGeometry(BALL_RADIUS * 1.5, 16, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                transparent: true,
                opacity: 0.2
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            ball.add(glow);

            // Add trail particles
            const trailGeometry = new THREE.SphereGeometry(BALL_RADIUS * 0.5, 8, 8);
            ball.userData.trail = [];
            for (let i = 0; i < 10; i++) {
                const trailBall = new THREE.Mesh(trailGeometry,
                    new THREE.MeshBasicMaterial({
                        color: 0x00ffff,
                        transparent: true,
                        opacity: 0.3 - i * 0.03
                    })
                );
                trailBall.visible = false;
                scene.add(trailBall);
                ball.userData.trail.push(trailBall);
            }
        }

        function createPlayers() {
            const positions = [
                { team: 'A', x: -8, y: 1, z: 0 },    // Cyan team
                { team: 'A', x: -4, y: 2, z: 3 },
                { team: 'A', x: -4, y: 1, z: -3 },
                { team: 'B', x: 8, y: 1, z: 0 },     // Magenta team
                { team: 'B', x: 4, y: 2, z: 3 },
                { team: 'B', x: 4, y: 1, z: -3 },
            ];

            positions.forEach((pos, i) => {
                const color = pos.team === 'A' ? TEAM_A_COLOR : TEAM_B_COLOR;
                const geometry = new THREE.SphereGeometry(PLAYER_RADIUS, 16, 16);
                const material = new THREE.MeshBasicMaterial({ color });
                const player = new THREE.Mesh(geometry, material);
                player.position.set(pos.x, pos.y, pos.z);
                player.userData = {
                    team: pos.team,
                    velocity: new THREE.Vector3(),
                    controlled: i === 0
                };
                scene.add(player);
                players.push(player);

                // Glow ring for controlled player
                const ringGeometry = new THREE.TorusGeometry(PLAYER_RADIUS * 1.3, 0.05, 8, 32);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: 0xffff00,
                    transparent: true,
                    opacity: 0.8
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = Math.PI / 2;
                ring.visible = i === 0;
                player.add(ring);
                player.userData.ring = ring;
            });
        }

        function createBubbles() {
            const bubbleGeometry = new THREE.SphereGeometry(0.1, 8, 8);
            const bubbleMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                transparent: true,
                opacity: 0.5
            });

            for (let i = 0; i < 50; i++) {
                const bubble = new THREE.Mesh(bubbleGeometry, bubbleMaterial.clone());
                bubble.position.set(
                    (Math.random() - 0.5) * FIELD_RADIUS * 2,
                    Math.random() * 10,
                    (Math.random() - 0.5) * FIELD_RADIUS * 2
                );
                bubble.userData.speed = 0.5 + Math.random() * 1;
                bubble.userData.wobble = Math.random() * Math.PI * 2;
                scene.add(bubble);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Placeholder for gameLoop - will be implemented in Task 2
        let lastTime = 0;
        function gameLoop(time = 0) {
            const deltaTime = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            if (gameRunning) {
                handleInput(deltaTime);
                updatePhysics(deltaTime);
                updateAI(deltaTime);
                updateBubbles(deltaTime);
                checkGoals();
            }

            // Camera follows controlled player in movement direction
            const player = players[controlledPlayerIndex];
            if (player) {
                // Calculate camera offset based on movement direction
                // Camera stays behind player in the direction they're moving
                let camOffsetX = 15;
                let camOffsetZ = 15;
                let camOffsetY = 20;

                if (playerVelocity.length() > 0.1) {
                    // Camera offset is opposite to movement direction
                    const backDist = 18;
                    const sideDist = 8;
                    const upDist = 15;

                    // Camera position = player pos + offset opposite to movement
                    camOffsetX = -playerVelocity.x * backDist + playerVelocity.z * sideDist;
                    camOffsetZ = -playerVelocity.z * backDist - playerVelocity.x * sideDist;
                    camOffsetY = upDist;
                }

                const targetCamPos = new THREE.Vector3(
                    player.position.x + camOffsetX,
                    player.position.y + camOffsetY,
                    player.position.z + camOffsetZ
                );
                camera.position.lerp(targetCamPos, deltaTime * 3);

                // Look slightly ahead of player
                const lookTarget = player.position.clone();
                lookTarget.x += playerVelocity.x * 3;
                lookTarget.y += playerVelocity.y * 2;
                lookTarget.z += playerVelocity.z * 3;
                camera.lookAt(lookTarget);
            }

            updateUI();
            renderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }

        function handleInput(dt) {
            const player = players[controlledPlayerIndex];
            if (!player) return;

            // Tab - player switching (only on keydown, not hold)
            if (keys['Tab'] && !keys['TabUsed']) {
                keys['TabUsed'] = true;
                // Cycle through own team players
                const team = controlledPlayerIndex < 3 ? 'A' : 'B';
                const startIndex = team === 'A' ? 0 : 3;
                controlledPlayerIndex = startIndex + ((controlledPlayerIndex - startIndex + 1) % 3);

                // Update ring visibility
                players.forEach((p, i) => {
                    if (p.userData.ring) p.userData.ring.visible = (i === controlledPlayerIndex);
                });
            }
            if (!keys['Tab']) {
                keys['TabUsed'] = false;
            }

            let moveX = 0, moveY = 0, moveZ = 0;

            // WASD - horizontal movement
            if (keys['KeyW'] || keys['ArrowUp']) moveZ = -1;
            if (keys['KeyS'] || keys['ArrowDown']) moveZ = 1;
            if (keys['KeyA'] || keys['ArrowLeft']) moveX = -1;
            if (keys['KeyD'] || keys['ArrowRight']) moveX = 1;

            // UI - vertical movement
            if (keys['KeyU']) moveY = 1;
            if (keys['KeyI']) moveY = -1;

            // Normalize diagonal movement
            if (moveX !== 0 && moveZ !== 0) {
                moveX *= 0.707;
                moveZ *= 0.707;
            }

            // Apply speed
            let speed = PLAYER_SPEED;
            if (keys['Space'] && energy > 0 && !keys['SpaceUsed']) {
                speed *= SPRINT_MULTIPLIER;
                energy -= ENERGY_DRAIN * dt;
                energy = Math.max(0, energy);
                keys['SpaceUsed'] = true;
                playSprintSound();
            }
            if (!keys['Space']) {
                keys['SpaceUsed'] = false;
            }
            if (!keys['Space'] || energy <= 0) {
                energy += ENERGY_REGEN * dt;
                energy = Math.min(MAX_ENERGY, energy);
            }

            player.position.x += moveX * speed * dt;
            player.position.y += moveY * VERTICAL_SPEED * dt;
            player.position.z += moveZ * speed * dt;

            // Track movement direction for camera
            if (moveX !== 0 || moveY !== 0 || moveZ !== 0) {
                playerVelocity.set(moveX, moveY, moveZ).normalize();
            }

            // Keep player in bounds (hexagonal)
            clampToField(player.position);
        }

        function clampToField(pos) {
            const maxR = FIELD_RADIUS - PLAYER_RADIUS;
            const dist = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
            if (dist > maxR) {
                const scale = maxR / dist;
                pos.x *= scale;
                pos.z *= scale;
            }
            pos.y = Math.max(0.5, Math.min(8, pos.y));
        }

        function updatePhysics(dt) {
            let collided = false;

            // Ball collision with players
            players.forEach(p => {
                const dx = ball.position.x - p.position.x;
                const dy = ball.position.y - p.position.y;
                const dz = ball.position.z - p.position.z;
                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                const minDist = BALL_RADIUS + PLAYER_RADIUS;
                if (dist < minDist && dist > 0.001) {
                    collided = true;
                    const nx = dx / dist;
                    const ny = dy / dist;
                    const nz = dz / dist;

                    const overlap = minDist - dist;
                    ball.position.x += nx * (overlap + 0.5);
                    ball.position.y += ny * (overlap + 0.5);
                    ball.position.z += nz * (overlap + 0.5);

                    const speed = Math.max(ball.userData.velocity.length(), 3);
                    ball.userData.velocity.set(nx * speed, ny * speed, nz * speed);
                }
            });
            if (collided) playCollisionSound();

            // Player-player collision
            for (let iter = 0; iter < 3; iter++) {
                for (let i = 0; i < players.length; i++) {
                    for (let j = i + 1; j < players.length; j++) {
                        const p1 = players[i];
                        const p2 = players[j];

                        const dx = p2.position.x - p1.position.x;
                        const dy = p2.position.y - p1.position.y;
                        const dz = p2.position.z - p1.position.z;
                        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                        const minDist = PLAYER_RADIUS * 2;
                        if (dist < minDist && dist > 0.001) {
                            const nx = dx / dist;
                            const ny = dy / dist;
                            const nz = dz / dist;
                            const overlap = minDist - dist;

                            const push = overlap * 1.0;
                            p1.position.x -= nx * push;
                            p1.position.y -= ny * push;
                            p1.position.z -= nz * push;
                            p2.position.x += nx * push;
                            p2.position.y += ny * push;
                            p2.position.z += nz * push;
                        }
                    }
                }
            }

            // Ball physics
            if (ball.userData.velocity.length() > 0.01) {
                ball.position.x += ball.userData.velocity.x * dt;
                ball.position.y += ball.userData.velocity.y * dt;
                ball.position.z += ball.userData.velocity.z * dt;
                ball.userData.velocity.multiplyScalar(UNDERWATER_DRAG);

                // Ball bounds (hexagonal) - bounce instead of clamp
                const maxR = FIELD_RADIUS - BALL_RADIUS;
                const ballDistXZ = Math.sqrt(ball.position.x * ball.position.x + ball.position.z * ball.position.z);
                if (ballDistXZ > maxR) {
                    // Push back inside
                    const scale = maxR / ballDistXZ;
                    ball.position.x *= scale;
                    ball.position.z *= scale;
                    // Reflect velocity
                    const dot = ball.userData.velocity.x * (-ball.position.x/maxR) +
                               ball.userData.velocity.z * (-ball.position.z/maxR);
                    ball.userData.velocity.x -= 2 * dot * (-ball.position.x/maxR);
                    ball.userData.velocity.z -= 2 * dot * (-ball.position.z/maxR);
                    ball.userData.velocity.multiplyScalar(0.8);
                }

                // Ball Y bounds (keep in play area)
                ball.position.y = Math.max(BALL_RADIUS, Math.min(8 - BALL_RADIUS, ball.position.y));
                if (ball.position.y <= BALL_RADIUS || ball.position.y >= 8 - BALL_RADIUS) {
                    ball.userData.velocity.y *= -0.8;
                }

                // Update ball trail
                const speed = ball.userData.velocity.length();
                if (speed > 0.5) {
                    ball.userData.trail.forEach((t, i) => {
                        t.visible = true;
                        const trailDist = i * 0.3;
                        t.position.x = ball.position.x - ball.userData.velocity.x / speed * trailDist;
                        t.position.y = ball.position.y - ball.userData.velocity.y / speed * trailDist;
                        t.position.z = ball.position.z - ball.userData.velocity.z / speed * trailDist;
                    });
                } else {
                    ball.userData.trail.forEach(t => t.visible = false);
                }
            }
        }

        function updateBubbles(dt) {
            scene.children.forEach(child => {
                if (child.userData && child.userData.speed) {
                    child.position.y += child.userData.speed * dt;
                    child.userData.wobble += dt;
                    child.position.x += Math.sin(child.userData.wobble) * 0.02;
                    if (child.position.y > 15) {
                        child.position.y = 0;
                    }
                }
            });
        }

        function checkGoals() {
            // Left goal (cyan scores)
            if (ball.position.x < -FIELD_RADIUS - GOAL_DEPTH/2 &&
                Math.abs(ball.position.z) < GOAL_WIDTH/2 &&
                ball.position.y < 3) {
                scoreA++;
                playGoalSound('A');
                // Flash effect
                const flashColor = scoreA >= 5 ? 0x00ffff : 0xff00ff;
                const flashLight = new THREE.PointLight(flashColor, 5, 30);
                flashLight.position.copy(ball.position);
                scene.add(flashLight);
                setTimeout(() => scene.remove(flashLight), 500);
                resetPositions();
            }
            // Right goal (magenta scores)
            if (ball.position.x > FIELD_RADIUS + GOAL_DEPTH/2 &&
                Math.abs(ball.position.z) < GOAL_WIDTH/2 &&
                ball.position.y < 3) {
                scoreB++;
                playGoalSound('B');
                // Flash effect
                const flashColorB = scoreB >= 5 ? 0xff00ff : 0x00ffff;
                const flashLightB = new THREE.PointLight(flashColorB, 5, 30);
                flashLightB.position.copy(ball.position);
                scene.add(flashLightB);
                setTimeout(() => scene.remove(flashLightB), 500);
                resetPositions();
            }

            if (scoreA >= 5 || scoreB >= 5) {
                gameRunning = false;
                const winner = scoreA >= 5 ? 'CYAN' : 'MAGENTA';
                alert(winner + ' WINS!');
            }
        }

        function resetPositions() {
            ball.position.set(0, 1, 0);
            ball.userData.velocity.set(0, 0, 0);

            players[0].position.set(-8, 1, 0);
            players[1].position.set(-4, 2, 3);
            players[2].position.set(-4, 1, -3);
            players[3].position.set(8, 1, 0);
            players[4].position.set(4, 2, 3);
            players[5].position.set(4, 1, -3);
        }

        function updateUI() {
            // Update 3D player indicator
            players.forEach((p, i) => {
                if (p.userData.ring) {
                    p.userData.ring.visible = (i === controlledPlayerIndex);
                    if (i === controlledPlayerIndex) {
                        p.userData.ring.rotation.z += 0.05;
                    }
                }
            });

            document.getElementById('score-a').textContent = 'CYAN: ' + scoreA;
            document.getElementById('score-b').textContent = 'MAGENTA: ' + scoreB;
            document.getElementById('energy-fill').style.width = energy + '%';
            document.getElementById('player-indicator').textContent =
                'Controlling: P' + (controlledPlayerIndex + 1) + ' (' +
                (controlledPlayerIndex < 3 ? 'CYAN' : 'MAGENTA') + ')';
        }

        const AI_STATES = {
            CHASE_BALL: 'chase_ball',
            ATTACK: 'attack',
            DEFEND: 'defend',
            SHOOT: 'shoot'
        };

        function updateAI(dt) {
            players.forEach((player, index) => {
                // Skip controlled player
                if (index === controlledPlayerIndex) return;

                const team = player.userData.team;
                const isAI = (team === 'A' && index > 0) || (team === 'B' && index > 3);
                if (!isAI) return;

                // Simple state machine
                const distToBall = player.position.distanceTo(ball.position);
                const distToOwnGoal = team === 'A' ?
                    player.position.x + FIELD_RADIUS :
                    FIELD_RADIUS - player.position.x;

                let targetPos = ball.position.clone();
                let state = AI_STATES.ATTACK;

                // Defend if ball is far and near own goal
                if (distToBall > 10 && distToOwnGoal < 8) {
                    state = AI_STATES.DEFEND;
                    targetPos = new THREE.Vector3(
                        team === 'A' ? -5 : 5,
                        1,
                        ball.position.z * 0.5
                    );
                }

                // Chase ball if far
                if (distToBall > 5) {
                    state = AI_STATES.CHASE_BALL;
                    targetPos = ball.position.clone();
                }

                // Shoot when close to ball
                if (distToBall < 2) {
                    state = AI_STATES.SHOOT;
                    // Aim at opponent's goal
                    const goalX = team === 'A' ? FIELD_RADIUS + 3 : -FIELD_RADIUS - 3;
                    const shootDir = new THREE.Vector3(
                        goalX - player.position.x,
                        0,
                        -player.position.z
                    ).normalize();
                    targetPos = player.position.clone().add(shootDir.multiplyScalar(3));
                }

                // Move toward target
                const direction = targetPos.clone().sub(player.position).normalize();
                const aiSpeed = PLAYER_SPEED * 0.8; // Slightly slower than player

                player.position.add(direction.multiplyScalar(aiSpeed * dt));

                // Vertical behavior - stay near ball's Y
                const targetY = Math.max(0.5, Math.min(5, ball.position.y));
                player.position.y += (targetY - player.position.y) * dt * 2;

                clampToField(player.position);
            });
        }

        // Start
        init();
    </script>
